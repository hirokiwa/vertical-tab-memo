<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Redirecting...</title>
    <script>
      const readPreferredLocale = () => {
        const languageCandidates =
          Array.isArray(navigator.languages) && navigator.languages.length > 0
            ? navigator.languages
            : typeof navigator.language === 'string' && navigator.language.length > 0
              ? [navigator.language]
              : []

        const preferredLanguage = languageCandidates[0]
        if (typeof preferredLanguage !== 'string' || preferredLanguage.length === 0) {
          return 'ja'
        }

        return preferredLanguage.toLowerCase().startsWith('ja') ? 'ja' : 'en'
      }

      const redirectLocale = readPreferredLocale()
      window.location.replace(`/${redirectLocale}/privacy/`)
    </script>
  </head>
  <body>
    <p>Redirecting to your preferred language...</p>
    <!-- <script type="module" src="/src/entries/privacy.ts"></script> -->
  </body>
</html>
