<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/styles/app.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="縦タブメモ のお問い合わせページ" />
    <title>お問い合わせ | 縦タブメモ</title>
  </head>
  <body>
    <div id="app" class="privacy-page">
      <main class="privacy-page__main">
        <article class="privacy-policy" aria-labelledby="contact-page-title">
          <header class="privacy-policy__header">
            <p class="privacy-policy__eyebrow">✉️ Contact</p>
            <h1 id="contact-page-title" class="privacy-policy__title">お問い合わせ</h1>
            <p class="privacy-policy__lead">ご質問、ご要望、不具合報告は、メールまたはお問い合わせフォームからご連絡ください。</p>
          </header>
          <section class="privacy-policy__section" aria-labelledby="contact-section-mail">
            <h2 id="contact-section-mail" class="privacy-policy__section-title">メール</h2>
            <p class="privacy-policy__text">
              <a class="privacy-policy__link" href="mailto:contact@hirokiwa.com">contact@hirokiwa.com</a>
            </p>
          </section>
          <section class="privacy-policy__section" aria-labelledby="contact-section-form">
            <h2 id="contact-section-form" class="privacy-policy__section-title">お問い合わせフォーム</h2>
            <div class="contact-page__frame-shell">
              <iframe
                class="contact-page__frame"
                src="https://docs.google.com/forms/d/e/1FAIpQLSd8bpfI5QppLfBfRvHRrGM2N-nkhPpXSy6vbva--LU0qOjWmg/viewform?embedded=true"
                title="縦タブメモ お問い合わせフォーム"
                loading="lazy"
              >
                お問い合わせフォームを表示できない場合は、contact@hirokiwa.com へご連絡ください。
              </iframe>
            </div>
          </section>
        </article>
      </main>
      <footer class="privacy-page__footer">
        <nav class="memo-app__footer-nav" aria-label="Contact footer links">
          <a class="memo-app__footer-link" href="/">🏠 メイン画面に戻る</a>
          <a class="memo-app__footer-link" href="/privacy/">🔐 プライバシーポリシー</a>
        </nav>
      </footer>
    </div>
    <!-- <script type="module" src="/src/entries/contact.ts"></script> -->
  </body>
</html>
