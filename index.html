<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/styles/app.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chromeの縦タブ向けメモ" />
    <title>縦タブメモ</title>
  </head>
  <body>
    <div id="app" class="memo-app">
      <main class="memo-app__main">
        <section class="memo-card" aria-label="Memo editor">
          <h2 class="memo-card__title">縦タブメモ</h2>
          <p class="memo-card__description">ブラウザの縦タブで表示する 1 行メモ</p>
          <form id="memo-form" class="memo-card__form" aria-label="Memo form">
            <label class="memo-card__label" for="memo-input">表示テキスト</label>
            <input
              id="memo-input"
              class="memo-card__input"
              type="text"
              autocomplete="off"
              spellcheck="false"
              aria-describedby="memo-preview"
            />
          </form>
          <section class="memo-card__icon-section" aria-label="Favicon icon selector">
            <h3 class="memo-card__icon-title">アイコン</h3>
            <ul id="memo-icon-list" class="memo-card__icon-list">
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-0" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="笑顔アイコンを選択" tabindex="-1">😀</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-1" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="爆笑アイコンを選択" tabindex="-1">😂</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-2" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="うるうるアイコンを選択" tabindex="-1">🥺</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-3" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="クールアイコンを選択" tabindex="-1">😎</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-4" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="考え中アイコンを選択" tabindex="-1">🤔</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-5" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="休憩アイコンを選択" tabindex="-1">😴</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-6" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="熱量アイコンを選択" tabindex="-1">🔥</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-7" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="完了アイコンを選択" tabindex="-1">✅</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-8" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="重要アイコンを選択" tabindex="-1">👆</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-9" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="下へアイコンを選択" tabindex="-1">👇</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-10" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="好きアイコンを選択" tabindex="-1">❤️</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-11" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="ひらめきアイコンを選択" tabindex="-1">💡</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-12" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="優先アイコンを選択" tabindex="-1">⭐</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-13" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="集中アイコンを選択" tabindex="-1">🚀</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-14" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="固定アイコンを選択" tabindex="-1">📌</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-15" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="えんぴつアイコンを選択" tabindex="-1">✏️</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-16" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="通知アイコンを選択" tabindex="-1">📣</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-17" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="注意アイコンを選択" tabindex="-1">⚠️</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-18" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="お祝いアイコンを選択" tabindex="-1">🎉</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-19" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="たこアイコンを選択" tabindex="-1">🐙</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-20" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="四つ葉アイコンを選択" tabindex="-1">🍀</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-21" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="きのこアイコンを選択" tabindex="-1">🍄</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-22" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="地球アイコンを選択" tabindex="-1">🌏</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-23" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="ひよこアイコンを選択" tabindex="-1">🐥</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-24" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="ブロッコリーアイコンを選択" tabindex="-1">🥦</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-25" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="ハンバーガーアイコンを選択" tabindex="-1">🍔</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-26" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="おにぎりアイコンを選択" tabindex="-1">🍙</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-27" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="ビールアイコンを選択" tabindex="-1">🍺</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-28" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="プレゼントアイコンを選択" tabindex="-1">🎁</button>
              </li>
              <li class="memo-card__icon-item">
                <button id="memo-icon-option-29" class="memo-card__icon-button" type="button" aria-pressed="false" aria-label="車アイコンを選択" tabindex="-1">🚗</button>
              </li>
              <li id="memo-custom-icon-toggle-item" class="memo-card__icon-item">
                <button
                  id="memo-custom-icon-toggle"
                  class="memo-card__icon-button memo-card__icon-button--custom"
                  type="button"
                  aria-pressed="false"
                  aria-haspopup="dialog"
                  aria-controls="memo-custom-icon-dialog"
                  aria-label="任意アイコン入力を開く"
                  tabindex="-1"
                >
                  ➕
                </button>
              </li>
            </ul>
          </section>
          <h3 class="memo-card__preview-title">プレビュー</h3>
          <p id="memo-preview" class="memo-card__preview" aria-live="polite"></p>
          <section class="memo-card__share-section" aria-labelledby="memo-share-title" aria-describedby="memo-share-note">
            <h3 id="memo-share-title" class="memo-card__url-title">このメモをシェア</h3>
            <div class="memo-card__share-actions" role="group" aria-label="共有方法">
              <button id="memo-share-x" class="memo-card__share-button" type="button" aria-label="Xで共有">
                <span class="memo-card__share-icon memo-card__share-icon--image" aria-hidden="true">
                  <img class="memo-card__share-icon-image" src="https://grandring.hirokiwa.com/x-icon.svg" alt="" width="24" height="24" />
                </span>
                <span class="memo-card__share-label">X</span>
              </button>
              <button id="memo-share-line" class="memo-card__share-button" type="button" aria-label="LINEで共有">
                <span class="memo-card__share-icon memo-card__share-icon--image" aria-hidden="true">
                  <img class="memo-card__share-icon-image" src="https://grandring.hirokiwa.com/line-icon.svg" alt="" width="24" height="24" />
                </span>
                <span class="memo-card__share-label">LINE</span>
              </button>
              <button id="memo-url-copy" class="memo-card__share-button" type="button" aria-label="URLをコピー">
                <span class="memo-card__share-icon memo-card__share-icon--copy" aria-hidden="true">
                  <svg id="memo-url-copy-icon" class="memo-card__share-icon-svg" viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-240v-480 480Z" />
                  </svg>
                </span>
                <span class="memo-card__share-label">URLをコピー</span>
              </button>
              <button id="memo-share-native" class="memo-card__share-button" type="button" aria-label="共有メニューを開く">
                <span class="memo-card__share-icon memo-card__share-icon--native" aria-hidden="true">
                  <svg class="memo-card__share-icon-svg" viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M680-80q-50 0-85-35t-35-85q0-6 3-28L282-392q-16 15-37 23.5t-45 8.5q-50 0-85-35t-35-85q0-50 35-85t85-35q24 0 45 8.5t37 23.5l281-164q-2-7-2.5-13.5T560-760q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35q-24 0-45-8.5T598-672L317-508q2 7 2.5 13.5t.5 14.5q0 8-.5 14.5T317-452l281 164q16-15 37-23.5t45-8.5q50 0 85 35t35 85q0 50-35 85t-85 35Zm0-80q17 0 28.5-11.5T720-200q0-17-11.5-28.5T680-240q-17 0-28.5 11.5T640-200q0 17 11.5 28.5T680-160ZM200-440q17 0 28.5-11.5T240-480q0-17-11.5-28.5T200-520q-17 0-28.5 11.5T160-480q0 17 11.5 28.5T200-440Zm508.5-291.5Q720-743 720-760t-11.5-28.5Q697-800 680-800t-28.5 11.5Q640-777 640-760t11.5 28.5Q663-720 680-720t28.5-11.5ZM680-200ZM200-480Zm480-280Z" />
                  </svg>
                </span>
                <span class="memo-card__share-label">その他</span>
              </button>
            </div>
            <p id="memo-share-note" class="memo-card__note">
              共有 URL を第三者へ送ると入力内容が相手にも表示されます。
              個人情報や機密情報の入力は避けてください。
            </p>
          </section>
        </section>
      </main>
      <dialog id="memo-custom-icon-dialog" class="memo-dialog" aria-label="任意アイコン入力モーダル">
        <form id="memo-custom-icon-form" class="memo-dialog__form" method="dialog" aria-label="Custom favicon icon form">
          <h3 class="memo-dialog__title">任意アイコン</h3>
          <label class="memo-card__label" for="memo-custom-icon-input">絵文字1文字</label>
          <input
            id="memo-custom-icon-input"
            class="memo-card__custom-icon-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            aria-describedby="memo-custom-icon-error"
          />
          <p id="memo-custom-icon-error" class="memo-card__custom-icon-error" aria-live="polite"></p>
          <div class="memo-dialog__actions">
            <button id="memo-custom-icon-close" class="memo-dialog__button" type="button" aria-label="閉じる">✖️ 閉じる</button>
            <button id="memo-custom-icon-save" class="memo-dialog__button memo-dialog__button--primary" type="submit" aria-label="保存">✅ 保存</button>
          </div>
        </form>
      </dialog>
      <script
        async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5553296223899055"
        crossorigin="anonymous"
      ></script>
      <section class="memo-app__ad-section" aria-label="スポンサーリンク">
        <article class="memo-app__ad-card">
          <!-- Vertical Tab Memo Square 1 -->
          <ins
            class="adsbygoogle memo-app__ad-unit"
            style="display:block"
            data-ad-client="ca-pub-5553296223899055"
            data-ad-slot="9444104774"
            data-ad-format="auto"
            data-full-width-responsive="true"
          ></ins>
          <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
        </article>
        <article class="memo-app__ad-card">
          <!-- Vertical Tab Memo Square 2 -->
          <ins
            class="adsbygoogle memo-app__ad-unit"
            style="display:block"
            data-ad-client="ca-pub-5553296223899055"
            data-ad-slot="9178614535"
            data-ad-format="auto"
            data-full-width-responsive="true"
          ></ins>
          <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
        </article>
      </section>
      <footer class="memo-app__footer" aria-label="Footer">
        <nav class="memo-app__footer-nav" aria-label="Footer links">
          <a class="memo-app__footer-link" href="/contact/">✉️ お問い合わせ</a>
          <a class="memo-app__footer-link" href="/privacy/">🔐 プライバシーポリシー</a>
        </nav>
      </footer>
    </div>
    <script type="module" src="/src/entries/index.ts"></script>
  </body>
</html>
