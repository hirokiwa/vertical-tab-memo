<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <meta name="keywords" content="縦タブ, タブメモ, 縦タブメモ, ブラウザメモ, 1行メモ, メモアプリ, vertical tabs, tab memo, vertical tab memo, browser notes, one line notes, chrome tabs, edge vertical tabs">
    
    <!-- OGP -->
    <meta property="og:title" content="{{OG_TITLE}}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{OG_URL}}" />
    <meta property="og:image" content="{{OG_IMAGE_URL}}" />
    <meta property="og:description" content="{{OG_DESCRIPTION}}" />
    <meta property="og:site_name" content="{{OG_SITE_NAME}}" />
    <meta property="og:locale" content="{{OG_LOCALE}}" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="{{TWITTER_SITE}}" />
    <meta name="twitter:title" content="{{TWITTER_TITLE}}" />
    <meta name="twitter:description" content="{{TWITTER_DESCRIPTION}}" />
    <meta name="twitter:image" content="{{TWITTER_IMAGE_URL}}" />
    
    <title>{{REDIRECT_TITLE}}</title>
    <script>
      const readPreferredLocale = () => {
        const languageCandidates =
          Array.isArray(navigator.languages) && navigator.languages.length > 0
            ? navigator.languages
            : typeof navigator.language === 'string' && navigator.language.length > 0
              ? [navigator.language]
              : []

        const preferredLanguage = languageCandidates[0]
        if (typeof preferredLanguage !== 'string' || preferredLanguage.length === 0) {
          return 'ja'
        }

        return preferredLanguage.toLowerCase().startsWith('ja') ? 'ja' : 'en'
      }

      const redirectLocale = readPreferredLocale()
      window.location.replace(`/${redirectLocale}{{REDIRECT_SUFFIX}}`)
    </script>
  </head>
  <body>
    <p>{{REDIRECT_MESSAGE}}</p>
    {{EXTRA_COMMENT}}
  </body>
</html>
