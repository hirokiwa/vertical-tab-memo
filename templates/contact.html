<!doctype html>
<html lang="{{HTML_LANG}}">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/styles/app.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{META_DESCRIPTION}}" />
    <title>{{META_TITLE}}</title>
    {{SEO_LINKS}}
  </head>
  <body>
    <div id="app" class="privacy-page">
      <main class="privacy-page__main">
        <article class="privacy-policy" aria-labelledby="contact-page-title">
          <header class="privacy-policy__header">
            <nav class="page-language-nav" aria-label="{{LANGUAGE_NAV_LABEL}}">
              <a class="page-language-nav__link" href="{{LANGUAGE_SWITCH_HREF}}" hreflang="{{LANGUAGE_SWITCH_LOCALE}}" lang="{{LANGUAGE_SWITCH_LOCALE}}" aria-label="{{LANGUAGE_SWITCH_ARIA_LABEL}}">

                </svg>
                <span class="page-language-nav__label">{{LANGUAGE_SWITCH_LABEL}}</span>
              </a>
            </nav>
            <p class="privacy-policy__eyebrow">{{EYEBROW}}</p>
            <h1 id="contact-page-title" class="privacy-policy__title">{{TITLE}}</h1>
            <p class="privacy-policy__lead">{{LEAD}}</p>
          </header>
          <section class="privacy-policy__section" aria-labelledby="contact-section-mail">
            <h2 id="contact-section-mail" class="privacy-policy__section-title">{{MAIL_TITLE}}</h2>
            <p class="privacy-policy__text">
              <a class="privacy-policy__link" href="mailto:{{CONTACT_EMAIL}}">{{CONTACT_EMAIL}}</a>
            </p>
          </section>
          <section class="privacy-policy__section" aria-labelledby="contact-section-form">
            <h2 id="contact-section-form" class="privacy-policy__section-title">{{FORM_TITLE}}</h2>
            <div class="contact-page__frame-shell">
              <iframe
                class="contact-page__frame"
                src="{{CONTACT_FORM_URL}}"
                title="{{FORM_FRAME_TITLE}}"
                loading="lazy"
              >
                {{FORM_FALLBACK}}
              </iframe>
            </div>
          </section>
        </article>
      </main>
      <footer class="privacy-page__footer">
        <nav class="memo-app__footer-nav" aria-label="{{FOOTER_NAV_ARIA_LABEL}}">
          <a class="memo-app__footer-link" href="{{HOME_LINK_HREF}}">{{HOME_LINK_LABEL}}</a>
          <a class="memo-app__footer-link" href="{{PRIVACY_LINK_HREF}}">{{PRIVACY_LINK_LABEL}}</a>
        </nav>
      </footer>
    </div>
    <!-- <script type="module" src="/src/entries/contact.ts"></script> -->
  </body>
</html>
